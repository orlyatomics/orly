# Build & test orly on Ubuntu 24.04 / gcc 13.
#
# Four jobs run on every push to master and every pull_request:
#   1. debug-and-test     -- make debug + make test (188 binaries)
#   2. release-build      -- jhm -c release direct + --help smoke on each binary
#   3. lang-tests         -- make debug + python3 tools/lang_test.py
#   4. examples           -- run each examples/* end-to-end with both
#                            its Python and Go drivers (orlyc + orlyi + WS)
#
# Caching: apt packages and the ccache store are cached across runs. The
# ~4.5 GB build-output tree is too large to persist in the 10 GB Actions
# cache, so we cache ccache instead: jhm and orlyc both invoke g++/gcc by
# bare name via execvp, so prepending /usr/lib/ccache to PATH routes every
# compile through ccache. jhm still re-runs jobs (it decides by mtime, and
# checkout resets mtimes), but each compile is a ccache hit -- which also
# speeds lang_test, whose orlyc runs compile generated C++. To guard against
# silent stale-cache bugs, a `schedule:` trigger runs the same jobs daily
# with caching disabled; if the nightly ever diverges from the cached PR
# runs, that's the signal to investigate.
name: ci

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # Daily at 05:17 UTC -- off-peak, avoids the top-of-hour scheduler rush.
    - cron: '17 5 * * *'

jobs:
  debug-and-test:
    name: make debug + make test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: build-essential gcc g++ uuid-dev libgmp-dev libaio-dev libsnappy-dev libreadline-dev libboost-system-dev zlib1g-dev bison flex valgrind ccache
          version: 1.2

      - name: Set up ccache
        # jhm and orlyc both invoke `g++`/`gcc` by bare name via execvp. The
        # apt cache-action restores ccache without running its postinst, so
        # the usual /usr/lib/ccache compiler symlinks don't exist -- a prior
        # run showed ccache with 0 reads/writes (never invoked). Create the
        # masquerade symlinks explicitly in /usr/local/bin (ahead of /usr/bin
        # on PATH) so every compile -- the build *and* lang_test's orlyc
        # codegen -- routes through ccache. The store is small/compressible,
        # so unlike the 4.5 GB object tree it persists in the Actions cache.
        run: |
          for c in gcc g++ cc c++; do
            sudo ln -sf "$(command -v ccache)" "/usr/local/bin/$c"
          done
          {
            echo "CCACHE_DIR=$HOME/.ccache"
            echo "CCACHE_MAXSIZE=2G"
            echo "CCACHE_COMPRESS=1"
          } >> "$GITHUB_ENV"

      - name: Cache ccache
        if: github.event_name != 'schedule'
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: orly-ccache-${{ runner.os }}-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            orly-ccache-${{ runner.os }}-${{ github.job }}-
            orly-ccache-${{ runner.os }}-

      - name: make debug
        run: |
          ccache --zero-stats
          make debug

      - name: List built binaries
        run: |
          ls -la ../out_orly/debug/orly/orlyc \
                 ../out_orly/debug/orly/server/orlyi \
                 ../out_orly/debug/orly/spa/spa \
                 ../out_orly/debug/orly/client/orly_client

      - name: make test
        run: make test

      # Diagnostic: ccache hit/miss for this run's `make debug` (stats were
      # zeroed just before it). High direct-hit rate => the cache is working.
      - name: ccache stats
        if: always()
        run: ccache --show-stats --verbose

  release-build:
    name: jhm -c release
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: build-essential gcc g++ uuid-dev libgmp-dev libaio-dev libsnappy-dev libreadline-dev libboost-system-dev zlib1g-dev bison flex valgrind ccache
          version: 1.2

      - name: Set up ccache
        # jhm and orlyc both invoke `g++`/`gcc` by bare name via execvp. The
        # apt cache-action restores ccache without running its postinst, so
        # the usual /usr/lib/ccache compiler symlinks don't exist -- a prior
        # run showed ccache with 0 reads/writes (never invoked). Create the
        # masquerade symlinks explicitly in /usr/local/bin (ahead of /usr/bin
        # on PATH) so every compile -- the build *and* lang_test's orlyc
        # codegen -- routes through ccache. The store is small/compressible,
        # so unlike the 4.5 GB object tree it persists in the Actions cache.
        run: |
          for c in gcc g++ cc c++; do
            sudo ln -sf "$(command -v ccache)" "/usr/local/bin/$c"
          done
          {
            echo "CCACHE_DIR=$HOME/.ccache"
            echo "CCACHE_MAXSIZE=2G"
            echo "CCACHE_COMPRESS=1"
          } >> "$GITHUB_ENV"

      - name: Cache ccache
        if: github.event_name != 'schedule'
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: orly-ccache-${{ runner.os }}-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            orly-ccache-${{ runner.os }}-${{ github.job }}-
            orly-ccache-${{ runner.os }}-

      # Bootstrap first (same path make debug takes), then drive jhm
      # directly. `make release` works but its Makefile wrapper has a
      # cosmetic broken-pipe quirk at EOF -- direct jhm exits cleanly
      # with the full status trace. Tracked in #10.
      - name: Bootstrap jhm
        run: make bootstrap

      # tools/jhm because the Makefile's `export PATH` only applies inside
      # make's environment. PATH also has to include tools/ so that jhm
      # itself can execvp `make_dep_file` (a sibling in tools/).
      # Mirrors the last line of bootstrap.sh.
      - name: tools/jhm -c release
        run: PATH="$PWD/tools:$PATH" tools/jhm -c release

      - name: Smoke each release binary with --help
        run: |
          ../out_orly/release/orly/client/orly_client --help | head -1
          ../out_orly/release/orly/orlyc --help | head -1
          ../out_orly/release/orly/spa/spa --help | head -1
          # orlyi's --help prints a huge memory-tuning header first;
          # asserting non-empty output is enough for a smoke check.
          ../out_orly/release/orly/server/orlyi --help > /tmp/orlyi-help.txt
          test -s /tmp/orlyi-help.txt

  lang-tests:
    name: lang_test.py
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: build-essential gcc g++ uuid-dev libgmp-dev libaio-dev libsnappy-dev libreadline-dev libboost-system-dev zlib1g-dev bison flex valgrind ccache
          version: 1.2

      - name: Set up ccache
        # jhm and orlyc both invoke `g++`/`gcc` by bare name via execvp. The
        # apt cache-action restores ccache without running its postinst, so
        # the usual /usr/lib/ccache compiler symlinks don't exist -- a prior
        # run showed ccache with 0 reads/writes (never invoked). Create the
        # masquerade symlinks explicitly in /usr/local/bin (ahead of /usr/bin
        # on PATH) so every compile -- the build *and* lang_test's orlyc
        # codegen -- routes through ccache. The store is small/compressible,
        # so unlike the 4.5 GB object tree it persists in the Actions cache.
        run: |
          for c in gcc g++ cc c++; do
            sudo ln -sf "$(command -v ccache)" "/usr/local/bin/$c"
          done
          {
            echo "CCACHE_DIR=$HOME/.ccache"
            echo "CCACHE_MAXSIZE=2G"
            echo "CCACHE_COMPRESS=1"
          } >> "$GITHUB_ENV"

      - name: Cache ccache
        if: github.event_name != 'schedule'
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: orly-ccache-${{ runner.os }}-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            orly-ccache-${{ runner.os }}-${{ github.job }}-
            orly-ccache-${{ runner.os }}-

      - name: make debug
        run: make debug

      - name: python3 tools/lang_test.py
        run: python3 tools/lang_test.py -d orly/data tests/lang_tests

  examples:
    name: examples/* end-to-end
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: build-essential gcc g++ uuid-dev libgmp-dev libaio-dev libsnappy-dev libreadline-dev libboost-system-dev zlib1g-dev bison flex valgrind ccache
          version: 1.2

      - name: Set up ccache
        # jhm and orlyc both invoke `g++`/`gcc` by bare name via execvp. The
        # apt cache-action restores ccache without running its postinst, so
        # the usual /usr/lib/ccache compiler symlinks don't exist -- a prior
        # run showed ccache with 0 reads/writes (never invoked). Create the
        # masquerade symlinks explicitly in /usr/local/bin (ahead of /usr/bin
        # on PATH) so every compile -- the build *and* lang_test's orlyc
        # codegen -- routes through ccache. The store is small/compressible,
        # so unlike the 4.5 GB object tree it persists in the Actions cache.
        run: |
          for c in gcc g++ cc c++; do
            sudo ln -sf "$(command -v ccache)" "/usr/local/bin/$c"
          done
          {
            echo "CCACHE_DIR=$HOME/.ccache"
            echo "CCACHE_MAXSIZE=2G"
            echo "CCACHE_COMPRESS=1"
          } >> "$GITHUB_ENV"

      - name: Install python websocket-client
        run: pip3 install --break-system-packages websocket-client

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Cache ccache
        if: github.event_name != 'schedule'
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: orly-ccache-${{ runner.os }}-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            orly-ccache-${{ runner.os }}-${{ github.job }}-
            orly-ccache-${{ runner.os }}-

      - name: make debug
        run: make debug
        id: build

      # Smoke-tests the orlyc + orlyi + WebSocket protocol end to end.
      # Both drivers (Python + Go) exercise the same scenario and
      # self-check the full 72-value balance trajectory across both
      # branches; any divergence fails CI.
      - name: run.sh (python driver)
        run: ./run.sh
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        working-directory: examples/bitcoin-time-travel

      - name: run-go.sh (go driver)
        run: ./run-go.sh
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        working-directory: examples/bitcoin-time-travel

      # Same scenario as bitcoin-time-travel but uses set union instead
      # of integer addition. Demonstrates the polymorphic-monoid claim
      # from that demo's README: same fold pattern, different operator.
      - name: wikipedia-categories run.sh (python driver)
        run: ./run.sh
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        working-directory: examples/wikipedia-categories

      - name: wikipedia-categories run-go.sh (go driver)
        run: ./run-go.sh
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        working-directory: examples/wikipedia-categories

      # The concurrent-writers demo: N sessions all `+= n` into the same
      # hot keys. Self-checks that every increment lands (no lost updates).
      # This is the integration validation for the issue #49 fix --
      # without phases 2+3, only ~1/N of the writes survive.
      # DEMO_SCALE=small opts into the CI-tractable 4-writer / 800-event
      # workload; the default (large) is the 8-writer / 2000-event
      # local-showcase mode used in the README / tweet captures.
      - name: wikipedia-pageviews run.sh (python driver, concurrent +=)
        run: ./run.sh
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        working-directory: examples/wikipedia-pageviews
        env:
          DEMO_SCALE: small

      - name: wikipedia-pageviews run-go.sh (go driver, concurrent +=)
        run: ./run-go.sh
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        working-directory: examples/wikipedia-pageviews
        env:
          DEMO_SCALE: small

      # Multi-agent knowledge-graph demo: N concurrent agents each
      # extract from a disjoint slice of a corpus, writing tags
      # (|= set-union), per-doc mentions (+= int), and per-pair
      # cooccurrences (+= int) into one shared POV with zero
      # coordination. Combines both commutative-write shapes from the
      # demos above and runs them concurrently -- the shape multi-agent
      # LLM-extraction pipelines need. DEMO_SCALE=small uses 4 agents
      # over 20 docs for CI tractability.
      - name: agent-swarm run.sh (python driver, concurrent |= and +=)
        run: ./run.sh
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        working-directory: examples/agent-swarm
        env:
          DEMO_SCALE: small

      - name: agent-swarm run-go.sh (go driver, concurrent |= and +=)
        run: ./run-go.sh
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        working-directory: examples/agent-swarm
        env:
          DEMO_SCALE: small

      # GRC-20 reference demo: each editor's op is one set-union into a
      # per-(entity, property) history set; reads replay the timestamp-
      # sorted log to reconstruct entity state (or any historical
      # state). Three phases: wiki biographical / stanford schools +
      # relations / concurrent race on the same attribute. Self-checks
      # that both race events land in history.
      - name: grc20-pov run.sh (python driver, event-sourced KG)
        run: ./run.sh
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        working-directory: examples/grc20-pov

      - name: grc20-pov run-go.sh (go driver, event-sourced KG)
        run: ./run-go.sh
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        working-directory: examples/grc20-pov

      # Collaborative text CRDT (Logoot): two editors stream inserts/deletes
      # into one shared POV with no coordination; each character is one
      # set-union with a dense position id, and the visible text is the
      # engine's sort+fold. Four phases (sequential / non-overlapping /
      # same-spot race / delete+insert). Self-checks convergence across three
      # independent readers, no lost concurrent edits, and stable time-travel.
      - name: crdt-text run.sh (python driver, collaborative CRDT)
        run: ./run.sh
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        working-directory: examples/crdt-text

      - name: crdt-text run-go.sh (go driver, collaborative CRDT)
        run: ./run-go.sh
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        working-directory: examples/crdt-text

      # Recursive sum-type storage + client marshaling smoke test (issue
      # #115): store a fixed recursive value of each shape (self-recursive
      # tree, container-of-self doc, mutual tree/forest, nested-variant tree),
      # read it back, and self-check the marshaled JSON. Guards the
      # dynamic-var/WS marshaling path that the C++ lang_test (a native-read
      # harness) cannot reach.
      - name: recursive-variants run.sh (python driver, recursive storage)
        run: ./run.sh
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        working-directory: examples/recursive-variants

      - name: recursive-variants run-go.sh (go driver, recursive storage)
        run: ./run-go.sh
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        working-directory: examples/recursive-variants
