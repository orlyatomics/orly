<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Orly — live prediction market</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        background: #0d1117; color: #e6edf3;
        font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .card {
        width: min(440px, 92vw); background: #161b22; border: 1px solid #30363d;
        border-radius: 14px; padding: 24px 26px; box-shadow: 0 8px 30px #0008;
      }
      h1 { font-size: 1.15rem; margin: 0 0 2px; }
      .sub { color: #8b949e; font-size: 0.85rem; margin-bottom: 18px; }
      .pool { font-size: 0.9rem; color: #8b949e; margin-bottom: 14px; }
      .pool b { color: #e6edf3; }
      .outcome { margin: 12px 0; display: flex; gap: 12px; align-items: center; }
      .bar {
        position: relative; flex: 1; height: 40px; background: #0d1117;
        border: 1px solid #30363d; border-radius: 8px; overflow: hidden;
      }
      .fill { position: absolute; inset: 0 auto 0 0; height: 100%; transition: width 0.4s ease; }
      .fill.YES { background: #1f6f43; }
      .fill.NO  { background: #8a3033; }
      .lbl { position: absolute; inset: 0; display: flex; align-items: center;
             padding: 0 12px; font-weight: 600; font-size: 0.9rem; }
      button {
        background: #21262d; color: #e6edf3; border: 1px solid #30363d;
        border-radius: 8px; padding: 8px 12px; font: inherit; font-size: 0.85rem;
        cursor: pointer; white-space: nowrap;
      }
      button:hover { background: #30363d; }
      .foot { margin-top: 20px; font-size: 0.78rem; color: #8b949e; }
      .share { word-break: break-all; color: #58a6ff; }
      .status { float: right; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 id="question">…</h1>
      <div class="sub">
        you: <code id="me">…</code><span class="status" id="status">connecting…</span>
      </div>
      <div class="pool">pool <b id="pool">$0</b></div>
      <div id="market"></div>
      <div class="foot">
        Open this link in another tab to trade against yourself — concurrent bets,
        zero coordination, the price moves live:<br />
        <span class="share" id="share">…</span>
      </div>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
